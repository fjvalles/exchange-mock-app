# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy with: render.com → New → Blueprint → connect this repo

services:
  # ── Rails API ──────────────────────────────────────────────────────────────
  - type: web
    name: exchange-api
    runtime: ruby
    rootDir: backend
    buildCommand: bundle install
    preDeployCommand: bundle exec rails db:migrate
    startCommand: bundle exec puma -C config/puma.rb
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: RAILS_MASTER_KEY
        sync: false                 # ← Set manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: exchange-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: exchange-redis
          type: redis
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false                 # ← Set to your frontend URL after deploy

  # ── Sidekiq background worker ──────────────────────────────────────────────
  - type: worker
    name: exchange-worker
    runtime: ruby
    rootDir: backend
    buildCommand: bundle install
    startCommand: bundle exec sidekiq
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: exchange-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: exchange-redis
          type: redis
          property: connectionString

  # ── Vite / React frontend (static site) ───────────────────────────────────
  - type: web
    name: exchange-app
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false                 # ← Set to https://exchange-api.onrender.com

  # ── Redis ──────────────────────────────────────────────────────────────────
  - type: redis
    name: exchange-redis
    plan: free
    ipAllowList: []               # Only allow internal connections

databases:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  - name: exchange-db
    plan: free
    databaseName: vitawallet
    user: vitawallet
