default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= ENV["DATABASE_URL"] %>

development:
  <<: *default
  database: vitawallet_development
  url: <%= ENV.fetch("DATABASE_URL", "postgres://vitawallet:vitawallet@localhost:5432/vitawallet_development") %>

test:
  <<: *default
  database: vitawallet_test
  url: <%= ENV.fetch("DATABASE_URL", "postgres://vitawallet:vitawallet@localhost:5432/vitawallet_test") %>

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
