services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vitawallet
      POSTGRES_PASSWORD: vitawallet
      POSTGRES_DB: vitawallet_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"          # 5433 on host to avoid conflict with local postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitawallet"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://vitawallet:vitawallet@db:5432/vitawallet_development
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: development
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
    volumes:
      - ./backend:/app
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/v1/balances -o /dev/null -w '%{http_code}' | grep -q '401' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  sidekiq:
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: []
    command: bundle exec sidekiq
    environment:
      DATABASE_URL: postgres://vitawallet:vitawallet@db:5432/vitawallet_development
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: development
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
    volumes:
      - ./backend:/app
      - bundle_cache:/usr/local/bundle
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: http://localhost:3000
    volumes:
      - ./frontend:/app
      - node_modules_cache:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  bundle_cache:
  node_modules_cache:
